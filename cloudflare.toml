# Cloudflare Pages Configuration
# This file is read by Cloudflare Pages during build/deploy

[build]
command = "npm run build"
output_directory = "dist"

# Deploy command - Use correct Pages command, NOT Worker command
# CHANGE THIS IN DASHBOARD TO: npx wrangler pages deploy dist
# Current wrong value: npx wrangler deploy

[build.environment]
NODE_VERSION = "18"
